<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Cicilan Motor</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f6fb;
        color: #1f2937;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      }
      body,
      button,
      input,
      select {
        font: inherit;
      }
      .page-wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
        position: relative;
      }
      .panel {
        width: min(620px, 100%);
        background: #ffffff;
        border-radius: 32px;
        box-shadow: 0 24px 60px rgba(15, 33, 86, 0.12);
        overflow: hidden;
        position: relative;
      }


      /* Tombol Close X - Tanpa lingkaran */
      .close-btn {
        position: absolute;
        top: 20px;
        right: 24px;
        background: none;
        border: none;
        color: #64748b;
        font-size: 1.8rem;
        font-weight: 300;
        cursor: pointer;
        padding: 8px 12px;
        line-height: 1;
        z-index: 10;
        transition: all 0.2s ease;
      }
      .close-btn:hover {
        color: #ef4444;
        transform: scale(1.1);
      }


      .panel__header {
        padding: 32px 32px 24px;
      }
      .panel__title {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .panel__subtitle {
        margin: 10px 0 0;
        color: #556987;
        line-height: 1.6;
        font-size: 0.95rem;
      }
      .tabs {
        display: flex;
        gap: 12px;
        margin: 24px 32px 0;
      }
      .tab {
        flex: 1;
        min-height: 48px;
        border: none;
        border-radius: 24px;
        background: #e8eff9;
        color: #556987;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tab:hover {
        opacity: 0.9;
      }
      .tab--active {
        background: #0f3d91;
        color: #fff;
      }
      .content {
        padding: 32px 32px 40px;
      }
      .hero {
        max-width: 100%;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .hero__eyebrow {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        background: #0f3d91;
        border-radius: 18px;
      }
      .hero__eyebrow svg {
        width: 20px;
        height: 20px;
        color: #fff;
      }
      .hero__copy {
        display: grid;
        gap: 4px;
      }
      .hero__heading {
        margin: 0;
        font-size: clamp(2rem, 2.5vw, 2.6rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }
      .hero__text {
        margin: 0;
        color: #556987;
        font-size: 1rem;
        line-height: 1.5;
      }
      .card {
        background: #0f3d91;
        border-radius: 28px;
        padding: 28px;
        color: #fff;
      }
      .card__block {
        background: #f8fbff;
        color: #1f2937;
        border-radius: 24px;
        padding: 26px 28px 28px;
      }
      .section-label {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
        font-weight: 700;
      }
      .section-label__icon {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: #0f3d91;
      }
      .section-label__icon svg {
        width: 20px;
        height: 20px;
        color: #fff;
      }
      .section-label__title {
        margin: 0;
        font-size: 1.05rem;
      }
      .section-label__subtitle {
        margin: 4px 0 0;
        font-size: 0.95rem;
        color: #4b5563;
        font-weight: 500;
      }
      .form-grid {
        display: grid;
        gap: 18px;
        margin-top: 18px;
      }
      .form-group {
        display: grid;
        gap: 10px;
      }
      .form-group label {
        font-size: 0.9rem;
        color: #334155;
        font-weight: 600;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        min-height: 52px;
        border-radius: 16px;
        border: 1px solid #d2d8e8;
        padding: 0 16px;
        background: #f8fafc;
        color: #0f172a;
        font-size: 1rem;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #0f3d91;
        box-shadow: 0 0 0 4px rgba(15, 61, 145, 0.12);
      }


      /* Button Tenor */
      .tenor-buttons {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .tenor-btn {
        flex: 1;
        min-height: 52px;
        border: 2px solid #d2d8e8;
        background: #f8fafc;
        color: #334155;
        border-radius: 16px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tenor-btn:hover {
        border-color: #0f3d91;
      }
      .tenor-btn.active {
        background: #0f3d91;
        color: white;
        border-color: #0f3d91;
      }
      .result-card {
        margin-top: 24px;
        background: #0f3d91;
        border-radius: 28px;
        padding: 32px;
        color: #fff;
        display: grid;
        gap: 10px;
        place-items: center;
        text-align: center;
      }
      .result-card__label {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 400;
        letter-spacing: -0.02em;
      }
      .result-card__value {
        margin: 0;
        font-size: clamp(2rem, 5vw, 2.8rem);
        font-weight: 600;
        line-height: 1.05;
      }
      .result-card__meta {
        margin: 0;
        color: rgba(255, 255, 255, 0.9);
        font-size: 1rem;
      }
      .hidden {
        display: none;
      }
          /* BAGIAN WA DITAMBAHKAN */
      .wa-button {
        margin-top: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        min-height: 48px;
        background-color: #25d366;
        color: #fff;
        border-radius: 16px;
        font-weight: 700;
        font-size: 0.95rem;
        text-decoration: none;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
      }
      .wa-button:hover {
        background-color: #20ba5a;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(37, 211, 102, 0.3);
      }
      .wa-button:active {
        transform: translateY(0);
      }
      .wa-button svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      <article class="panel" aria-label="Kalkulator cicilan motor">
        

        <button class="close-btn" onclick="closePage()" aria-label="Tutup">
          ×
        </button>


        <header class="panel__header">
          <h1 class="panel__title">Suzuki Address FI</h1>
          <p class="panel__subtitle">Detail lengkap spesifikasi dan simulasi kredit motor</p>
        </header>


        <div class="tabs" role="tablist" aria-label="Navigasi kalkulator">
          <button class="tab" role="tab" aria-selected="false" type="button" onclick="goToDetailMotor()">
            Detail Motor
          </button>
          <button class="tab tab--active" role="tab" aria-selected="true" type="button" onclick="stayInKalkulator()">
            Kalkulator Cicilan
          </button>
        </div>


        <section class="content">
          <div class="hero">
            <div class="hero__eyebrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 2H17C19.2091 2 21 3.79086 21 6V18C21 20.2091 19.2091 22 17 22H7C4.79086 22 3 20.2091 3 18V6C3 3.79086 4.79086 2 7 2Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8.5 9H15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M8.5 14H12.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="hero__copy">
              <h2 class="hero__heading">KALKULATOR CICILAN</h2>
              <p class="hero__text">Hitung cicilan mudah dan cepat</p>
            </div>
          </div>


          <div class="card">
            <div class="card__block">
              <div class="section-label">
                <span class="section-label__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17 3H7C5.9 3 5 3.9 5 5V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V5C19 3.9 18.1 3 17 3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 8H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M9 12H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M9 16H13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
                <div>
                  <p class="section-label__title">Input Data</p>
                  <p class="section-label__subtitle">Masukkan detail pembelian motor</p>
                </div>
              </div>


              <form class="form-grid" action="#" novalidate>
                <div class="form-group">
                  <label for="hargaMotor">Harga Motor</label>
                  <input id="hargaMotor" name="hargaMotor" type="text" value="Rp 22.800.000" readonly />
                </div>


                <div class="form-group">
                  <label for="dp">Down Payment (DP)</label>
                  <select id="dp" name="dp">
                    <option value="" disabled selected>Pilih DP</option>
                    <option value="3000000">Rp 3.000.000</option>
                    <option value="3500000">Rp 3.500.000</option>
                    <option value="4000000">Rp 4.000.000</option>
                    <option value="4500000">Rp 4.500.000</option>
                    <option value="5000000">Rp 5.000.000</option>
                    <option value="5500000">Rp 5.500.000</option>
                    <option value="6000000">Rp 6.000.000</option>
                    <option value="6500000">Rp 6.500.000</option>
                    <option value="7000000">Rp 7.000.000</option>
                    <option value="7500000">Rp 7.500.000</option>
                    <option value="8000000">Rp 8.000.000</option>
                    <option value="8500000">Rp 8.500.000</option>
                    <option value="9000000">Rp 9.000.000</option>
                    <option value="9500000">Rp 9.500.000</option>
                    <option value="10000000">Rp 10.000.000</option>
                  </select>
                </div>


                <div class="form-group">
                  <label>Tenor (Jangka Waktu)</label>
                  <div class="tenor-buttons" id="tenorButtons">
                    <button type="button" class="tenor-btn" data-tenor="12">1 Tahun</button>
                    <button type="button" class="tenor-btn" data-tenor="24">2 Tahun</button>
                    <button type="button" class="tenor-btn" data-tenor="36">3 Tahun</button>
                  </div>
                  <input type="hidden" id="tenor" name="tenor" value="">
                </div>
              </form>


              <div class="result-card hidden" id="resultCard" aria-live="polite">
                <p class="result-card__label">Angsuran yang dibayar</p>
                <p class="result-card__value" id="monthlyPayment">Rp 0</p>
                <p class="result-card__meta" id="resultNote">Pilih Down Payment dan tenor untuk melihat angsuran.</p>
                              <!-- BAGIAN WA DITAMBAHKAN -->
                <a class="wa-button" id="waSalesBtn" target="_blank" href="#">
                  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.5-5.739-1.453L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.42 9.863-9.858.002-2.634-1.02-5.11-2.885-6.978C16.578 1.889 14.1 .865 11.474.865 6.037.865 1.619 5.284 1.616 10.722c-.001 1.816.501 3.593 1.45 5.171l-.988 3.604 3.702-.97L6.647 19.15zM17.886 14.61c-.305-.152-1.802-.888-2.08-.99-.278-.101-.48-.152-.68.152-.2.304-.775.99-.95 1.192-.175.202-.35.227-.655.076-.305-.152-1.287-.475-2.45-1.514-.906-.809-1.518-1.809-1.695-2.113-.177-.305-.019-.47.133-.62.136-.136.305-.355.457-.532.152-.177.202-.304.304-.506.102-.203.051-.38-.025-.532-.076-.152-.68-1.64-.933-2.253-.247-.594-.497-.513-.68-.523-.175-.01-.377-.012-.578-.012-.202 0-.53.076-.807.38-.278.304-1.062 1.039-1.062 2.532s1.087 2.934 1.238 3.136c.152.202 2.138 3.262 5.178 4.57.723.311 1.286.498 1.725.637.726.23 1.387.197 1.91.119.582-.088 1.802-.736 2.055-1.447.253-.711.253-1.32.177-1.447-.076-.126-.278-.202-.583-.354z"/>
                  </svg>
                  Chat sales untuk mendapatkan diskon lebih
                </a>
</div>
            </div>
          </div>
        </section>
      </article>
    </div>


    <script>
      const tenorButtons = document.querySelectorAll('.tenor-btn');
      const tenorInput = document.getElementById('tenor');


      const dpSelect = document.getElementById('dp');
      const resultCard = document.getElementById('resultCard');
      const monthlyPayment = document.getElementById('monthlyPayment');
      const resultNote = document.getElementById('resultNote');


      // FORMAT RUPIAH
      function formatRupiah(value) {
        return "Rp " + value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      }


      function updateInstallment() {
        const dpValue = Number(dpSelect.value);
        const tenorValue = Number(tenorInput.value);
        let monthly = 0;


        // DP 3.000.000
        if (dpValue == 3000000) {
          if (tenorValue == 12) monthly = 2251000;
          else if (tenorValue == 24) monthly = 1250000;
          else if (tenorValue == 36) monthly = 931000;
        }
        // DP 3.500.000
        else if (dpValue == 3500000) {
          if (tenorValue == 12) monthly = 2197000;
          else if (tenorValue == 24) monthly = 1220000;
          else if (tenorValue == 36) monthly = 909000;
        }
        // DP 4.000.000
        else if (dpValue == 4000000) {
          if (tenorValue == 12) monthly = 2143000;
          else if (tenorValue == 24) monthly = 1191000;
          else if (tenorValue == 36) monthly = 886000;
        }
        // DP 4.500.000
        else if (dpValue == 4500000) {
          if (tenorValue == 12) monthly = 2090000;
          else if (tenorValue == 24) monthly = 1161000;
          else if (tenorValue == 36) monthly = 864000;
        }
        // DP 5.000.000
        else if (dpValue == 5000000) {
          if (tenorValue == 12) monthly = 2036000;
          else if (tenorValue == 24) monthly = 1131000;
          else if (tenorValue == 36) monthly = 842000;
        }
        // DP 5.500.000
        else if (dpValue == 5500000) {
          if (tenorValue == 12) monthly = 1982000;
          else if (tenorValue == 24) monthly = 1102000;
          else if (tenorValue == 36) monthly = 823000;
        }
        // DP 6.000.000
        else if (dpValue == 6000000) {
          if (tenorValue == 12) monthly = 1928000;
          else if (tenorValue == 24) monthly = 1072000;
          else if (tenorValue == 36) monthly = 801000;
        }
        // DP 6.500.000
        else if (dpValue == 6500000) {
          if (tenorValue == 12) monthly = 1874000;
          else if (tenorValue == 24) monthly = 1043000;
          else if (tenorValue == 36) monthly = 778000;
        }
        // DP 7.000.000
        else if (dpValue == 7000000) {
          if (tenorValue == 12) monthly = 1821000;
          else if (tenorValue == 24) monthly = 1013000;
          else if (tenorValue == 36) monthly = 756000;
        }
        // DP 7.500.000
        else if (dpValue == 7500000) {
          if (tenorValue == 12) monthly = 1767000;
          else if (tenorValue == 24) monthly = 983000;
          else if (tenorValue == 36) monthly = 733000;
        }
        // DP 8.000.000
        else if (dpValue == 8000000) {
          if (tenorValue == 12) monthly = 1713000;
          else if (tenorValue == 24) monthly = 954000;
          else if (tenorValue == 36) monthly = 711000;
        }
        // DP 8.500.000
        else if (dpValue == 8500000) {
          if (tenorValue == 12) monthly = 1659000;
          else if (tenorValue == 24) monthly = 924000;
          else if (tenorValue == 36) monthly = 689000;
        }
        // DP 9.000.000
        else if (dpValue == 9000000) {
          if (tenorValue == 12) monthly = 1605000;
          else if (tenorValue == 24) monthly = 895000;
          else if (tenorValue == 36) monthly = 685000;
        }
        // DP 9.500.000
        else if (dpValue == 9500000) {
          if (tenorValue == 12) monthly = 1552000;
          else if (tenorValue == 24) monthly = 865000;
          else if (tenorValue == 36) monthly = 662000;
        }
        // DP 10.000.000
        else if (dpValue == 10000000) {
          if (tenorValue == 12) monthly = 1498000;
          else if (tenorValue == 24) monthly = 835000;
          else if (tenorValue == 36) monthly = 640000;
        }


       // TAMPIL HASIL
if (monthly > 0) {
  monthlyPayment.innerHTML = formatRupiah(monthly);

  // ========================================================
  // LOGIKA PESAN WA DINAMIS (BISA UNTUK SEMUA JENIS MOTOR)
  // ========================================================
  const motorName = document.querySelector('.panel__title').innerText.trim();
  const installmentText = formatRupiah(monthly);
  
  // Mengambil teks dari option DP yang dipilih (ex: "Rp 3.000.000")
  const dpText = dpSelect.options[dpSelect.selectedIndex].text; 

  // Format kalimat pesan WhatsApp (Menggunakan '\n' untuk baris baru)
  const textMessage = `Halo Sales Suzuki, saya tertarik dengan unit *${motorName}*.\n\n` +
                      `Saya sudah mencoba simulasi di website dengan detail:\n` +
                      `- Down Payment (DP): ${dpText}\n` +
                      `- Tenor: ${tenorValue} Bulan\n` +
                      `- Angsuran: *${installmentText}/bulan*\n\n` +
                      `Boleh minta info lebih lanjut terkait ketersediaan unit dan diskonnya? Terima kasih.`;

  // Menggunakan kode negara 62 agar parameter pesan teks ter-encode dengan sempurna
  const waUrl = `https://wa.me/6282299318387?text=${encodeURIComponent(textMessage)}`;

  const waBtn = document.getElementById('waSalesBtn');
  if (waBtn) {
    waBtn.href = waUrl;
  }
  
  resultNote.innerHTML = "Cicilan selama " + tenorValue + " bulan";
  resultCard.classList.remove("hidden");
} else {
  resultCard.classList.add("hidden");
}
      }


      // BUTTON TENOR
      tenorButtons.forEach(button => {
        button.addEventListener("click", () => {
          tenorButtons.forEach(btn => {
            btn.classList.remove("active");
          });
          button.classList.add("active");
          tenorInput.value = button.dataset.tenor;
          updateInstallment();
        });
      });


      // DP CHANGE
      dpSelect.addEventListener("change", updateInstallment);


      // CLOSE BUTTON
      function closePage() {
        if (confirm("Apakah Anda yakin ingin kembali ke spesifikasi motor?")) {
          window.location.href = "../SPESIFIKASI/index_addressfi.html";
        }
      }


      function goToDetailMotor() {
        document.querySelector('.tab:nth-child(1)').classList.add('tab--active');
        document.querySelector('.tab:nth-child(2)').classList.remove('tab--active');
        setTimeout(() => {
          window.location.href = "../SPESIFIKASI/index_addressfi.html";
        }, 100);
      }


      function stayInKalkulator() {
        document.querySelector('.tab:nth-child(1)').classList.remove('tab--active');
        document.querySelector('.tab:nth-child(2)').classList.add('tab--active');
      }


      // 1. AMBIL PARAMETER URL (ID MOTOR & ASAL HALAMAN)
// ========================================================
const urlParams = new URLSearchParams(window.location.search);
const motorId = urlParams.get('id');
const asalHalaman = urlParams.get('from');

// Helper untuk format angka ke Rupiah saat dimasukkan ke input
function formatRupiahKalkulator(value) {
  return "Rp " + value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

// ========================================================
// 2. FETCH HARGA DARI DATABASE (HANYA MENGGANTI HARGA MOTOR)
// ========================================================
if (motorId) {
  fetch(`/api/motors`)
    .then(res => res.json())
    .then(data => {
      // Mencari data motor berdasarkan ID yang dikirim
      const motor = data.motors.find(m => m.id == motorId);
      if (motor) {
        const inputHarga = document.getElementById('hargaMotor');
        
        // Ganti nilai input harga dengan harga realtime database
        inputHarga.value = formatRupiahKalkulator(motor.harga);

        // Memicu ulang event listener atau jalankan fungsi hitung otomatis Anda (jika ada)
        // misal: inputHarga.dispatchEvent(new Event('input'));
        if (typeof updateInstallment === 'function') {
          updateInstallment();
        }
      }
    })
    .catch(err => {
      console.error("Gagal memuat harga terupdate dari database:", err);
    });
}

// ========================================================
// 3. PERBAIKAN TOMBOL CLOSE (& NAVIGASI TAB DETAIL)
// ========================================================
function closePage() {
  if (confirm("Apakah Anda yakin ingin kembali ke Detail Motor?")) {
    // Kembali ke detail motor dengan membawa id dan parameter asal halaman sebelumnya
    window.location.href = `../KATALOG/detail_motor.html?id=${motorId}&from=${asalHalaman}`;
  }
}

// Jika tab "Detail Motor" diklik, arahkan ke fungsi yang sama
function goToDetailMotor() {
  window.location.href = `../KATALOG/detail_motor.html?id=${motorId}&from=${asalHalaman}`;
}
    </script>
  </body>
</html>
