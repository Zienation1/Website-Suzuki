<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Cicilan Motor</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f6fb;
        color: #1f2937;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      }
      body,
      button,
      input,
      select,
      a {
        font: inherit;
      }
      .page-wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
        position: relative;
      }
      .panel {
        width: min(620px, 100%);
        background: #ffffff;
        border-radius: 32px;
        box-shadow: 0 24px 60px rgba(15, 33, 86, 0.12);
        overflow: hidden;
        position: relative;
      }

      /* Tombol Close X */
      .close-btn {
        position: absolute;
        top: 20px;
        right: 24px;
        background: none;
        border: none;
        color: #64748b;
        font-size: 1.8rem;
        font-weight: 300;
        cursor: pointer;
        padding: 8px 12px;
        line-height: 1;
        z-index: 10;
        transition: all 0.2s ease;
      }
      .close-btn:hover {
        color: #ef4444;
        transform: scale(1.1);
      }

      .panel__header {
        padding: 32px 32px 24px;
      }
      .panel__title {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .panel__subtitle {
        margin: 10px 0 0;
        color: #556987;
        line-height: 1.6;
        font-size: 0.95rem;
      }
      .tabs {
        display: flex;
        gap: 12px;
        margin: 24px 32px 0;
      }
      .tab {
        flex: 1;
        min-height: 48px;
        border: none;
        border-radius: 24px;
        background: #e8eff9;
        color: #556987;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tab:hover {
        opacity: 0.9;
      }
      .tab--active {
        background: #0f3d91;
        color: #fff;
      }
      .content {
        padding: 32px 32px 40px;
      }
      .hero {
        max-width: 100%;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .hero__eyebrow {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        background: #0f3d91;
        border-radius: 18px;
      }
      .hero__eyebrow svg {
        width: 20px;
        height: 20px;
        color: #fff;
      }
      .hero__copy {
        display: grid;
        gap: 4px;
      }
      .hero__heading {
        margin: 0;
        font-size: clamp(2rem, 2.5vw, 2.6rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }
      .hero__text {
        margin: 0;
        color: #556987;
        font-size: 1rem;
        line-height: 1.5;
      }
      .card {
        background: #0f3d91;
        border-radius: 28px;
        padding: 28px;
        color: #fff;
      }
      .card__block {
        background: #f8fbff;
        color: #1f2937;
        border-radius: 24px;
        padding: 26px 28px 28px;
      }
      .section-label {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
        font-weight: 700;
      }
      .section-label__icon {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: #0f3d91;
      }
      .section-label__icon svg {
        width: 20px;
        height: 20px;
        color: #fff;
      }
      .section-label__title {
        margin: 0;
        font-size: 1.05rem;
      }
      .section-label__subtitle {
        margin: 4px 0 0;
        font-size: 0.95rem;
        color: #4b5563;
        font-weight: 500;
      }
      .form-grid {
        display: grid;
        gap: 18px;
        margin-top: 18px;
      }
      .form-group {
        display: grid;
        gap: 10px;
      }
      .form-group label {
        font-size: 0.9rem;
        color: #334155;
        font-weight: 600;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        min-height: 52px;
        border-radius: 16px;
        border: 1px solid #d2d8e8;
        padding: 0 16px;
        background: #f8fafc;
        color: #0f172a;
        font-size: 1rem;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #0f3d91;
        box-shadow: 0 0 0 4px rgba(15, 61, 145, 0.12);
      }

      /* Button Tenor */
      .tenor-buttons {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .tenor-btn {
        flex: 1;
        min-height: 52px;
        border: 2px solid #d2d8e8;
        background: #f8fafc;
        color: #334155;
        border-radius: 16px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tenor-btn:hover {
        border-color: #0f3d91;
      }
      .tenor-btn.active {
        background: #0f3d91;
        color: white;
        border-color: #0f3d91;
      }

      /* RESULT CARD */
      .result-card {
        margin-top: 24px;
        background: #0f3d91;
        border-radius: 28px;
        padding: 24px;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .result-card__label {
        margin: 0 0 4px 0;
        font-size: 1rem;
        opacity: 0.9;
      }
      .result-card__value {
        margin: 0 0 4px 0;
        font-size: clamp(2.2rem, 5vw, 2.7rem);
        font-weight: 700;
        line-height: 1.1;
      }
      .result-card__meta {
        margin: 0 0 20px 0;
        color: rgba(255, 255, 255, 0.85);
        font-size: 0.95rem;
      }

      /* CTA BUTTON WHATSAPP */
      .cta-sales-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        min-height: 52px;
        padding: 0 24px;
        background: #25d366;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2);
        transition: all 0.3s ease;
        box-sizing: border-box;
      }
      .cta-sales-btn:hover {
        background: #20ba5a;
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(37, 211, 102, 0.3);
      }
      .cta-sales-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
        flex-shrink: 0;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      <article class="panel" aria-label="Kalkulator cicilan motor">
        
        <button class="close-btn" onclick="closePage()" aria-label="Tutup">
          &times;
        </button>

        <header class="panel__header">
          <h1 class="panel__title">Suzuki VStrom 250 SX</h1>
          <p class="panel__subtitle">Detail lengkap spesifikasi dan simulasi kredit motor</p>
        </header>

        <div class="tabs" role="tablist" aria-label="Navigasi kalkulator">
          <button class="tab" role="tab" aria-selected="false" type="button" onclick="goToDetailMotor()">
            Detail Motor
          </button>
          <button class="tab tab--active" role="tab" aria-selected="true" type="button" onclick="stayInKalkulator()">
            Kalkulator Cicilan
          </button>
        </div>

        <section class="content">
          <div class="hero">
            <div class="hero__eyebrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 2H17C19.2091 2 21 3.79086 21 6V18C21 20.2091 19.2091 22 17 22H7C4.79086 22 3 20.2091 3 18V6C3 3.79086 4.79086 2 7 2Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8.5 9H15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M8.5 14H12.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="hero__copy">
              <h2 class="hero__heading">KALKULATOR CICILAN</h2>
              <p class="hero__text">Hitung cicilan mudah dan cepat</p>
            </div>
          </div>

          <div class="card">
            <div class="card__block">
              <div class="section-label">
                <span class="section-label__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17 3H7C5.9 3 5 3.9 5 5V19C5 20.1 5.9 21 7 21H17C18.1 21 19 20.1 19 19V5C19 3.9 18.1 3 17 3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 8H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M9 12H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M9 16H13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
                <div>
                  <p class="section-label__title">Input Data</p>
                  <p class="section-label__subtitle">Masukkan detail pembelian motor</p>
                </div>
              </div>

              <form class="form-grid" action="#" novalidate>
                <div class="form-group">
                  <label for="hargaMotor">Harga Motor</label>
                  <input id="hargaMotor" name="hargaMotor" type="text" value="Rp 63.750.000" readonly />
                </div>

                <div class="form-group">
                  <label for="dp">Down Payment (DP)</label>
                  <select id="dp" name="dp">
                    <option value="" disabled selected>Pilih DP</option>
                    <option value="10000000">Rp 10.000.000</option>
                    <option value="10500000">Rp 10.500.000</option>
                    <option value="11000000">Rp 11.000.000</option>
                    <option value="11500000">Rp 11.500.000</option>
                    <option value="12000000">Rp 12.000.000</option>
                    <option value="12500000">Rp 12.500.000</option>
                    <option value="13000000">Rp 13.000.000</option>
                    <option value="13500000">Rp 13.500.000</option>
                    <option value="14000000">Rp 14.000.000</option>
                    <option value="14500000">Rp 14.500.000</option>
                    <option value="15000000">Rp 15.000.000</option>
                    <option value="15500000">Rp 15.500.000</option>
                    <option value="16000000">Rp 16.000.000</option>
                    <option value="16500000">Rp 16.500.000</option>
                    <option value="17000000">Rp 17.000.000</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>Tenor (Jangka Waktu)</label>
                  <div class="tenor-buttons" id="tenorButtons">
                    <button type="button" class="tenor-btn" data-tenor="12">1 Tahun</button>
                    <button type="button" class="tenor-btn" data-tenor="24">2 Tahun</button>
                    <button type="button" class="tenor-btn" data-tenor="36">3 Tahun</button>
                  </div>
                  <input type="hidden" id="tenor" name="tenor" value="">
                </div>
              </form>

              <div class="result-card hidden" id="resultCard" aria-live="polite">
                <p class="result-card__label">Angsuran yang dibayar</p>
                <p class="result-card__value" id="monthlyPayment">Rp 0</p>
                <p class="result-card__meta" id="resultNote">Cicilan selama 36 bulan</p>
                
                <a href="#" id="waSalesBtn" class="cta-sales-btn" target="_blank">
                  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.455L0 24zm6.59-4.846c1.62.962 3.21 1.453 4.857 1.455 5.4 0 9.794-4.364 9.797-9.727.002-2.597-1.012-5.04-2.859-6.884C16.544 2.152 14.105 1.139 11.51 1.14c-5.41 0-9.813 4.368-9.817 9.73-.002 2.067.55 4.08 1.597 5.86l-.99 3.61 3.733-.967zm12.188-5.32c-.316-.157-1.874-.916-2.162-1.02-.287-.104-.497-.156-.706.157-.21.314-.81.156-.993.365-.182.208-.364.23-.68.073-.316-.157-1.334-.488-2.542-1.555-.94-.83-1.573-1.854-1.757-2.167-.183-.313-.02-.482.137-.638.142-.14.316-.365.474-.547.158-.182.21-.313.316-.522.105-.208.053-.392-.026-.548-.079-.156-.706-1.685-.967-2.31-.254-.607-.514-.526-.706-.536-.183-.01-.392-.012-.6-.012-.208 0-.547.078-.833.39-.286.313-1.097 1.066-1.097 2.6 0 1.535 1.123 3.02 1.28 3.23 1.122 1.515 2.47 2.766 4.154 3.42.396.15.792.24 1.192.31.404.07.77.03 1.06-.013.322-.047 1.873-.758 2.137-1.492.263-.733.263-1.36.184-1.492-.078-.13-.286-.208-.603-.365z"/>
                  </svg>
                  Chat sales untuk mendapatkan diskon lebih
                </a>
              </div>
            </div>
          </div>
        </section>
      </article>
    </div>

    <script>
      const tenorButtons = document.querySelectorAll('.tenor-btn');
      const tenorInput = document.getElementById('tenor');

      const dpSelect = document.getElementById('dp');
      const resultCard = document.getElementById('resultCard');
      const monthlyPayment = document.getElementById('monthlyPayment');
      const resultNote = document.getElementById('resultNote');
      const waSalesBtn = document.getElementById('waSalesBtn');

      function formatRupiah(value) {
        return "Rp " + value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      }

      function updateInstallment() {
        const dpValue = Number(dpSelect.value);
        const tenorValue = Number(tenorInput.value);
        let monthly = 0;

        if (dpValue == 10000000) {
            if (tenorValue == 12) monthly = 5892000;
            else if (tenorValue == 24) monthly = 3234000;
            else if (tenorValue == 36) monthly = 2443000;
        }
        else if (dpValue == 10500000) {
            if (tenorValue == 12) monthly = 5838000;
            else if (tenorValue == 24) monthly = 3204000;
            else if (tenorValue == 36) monthly = 2421000;
        }
        else if (dpValue == 11000000) {
            if (tenorValue == 12) monthly = 5784000;
            else if (tenorValue == 24) monthly = 3175000;
            else if (tenorValue == 36) monthly = 2398000;
        }
        else if (dpValue == 11500000) {
            if (tenorValue == 12) monthly = 5730000;
            else if (tenorValue == 24) monthly = 3180000;
            else if (tenorValue == 36) monthly = 2376000;
        }
        else if (dpValue == 12000000) {
            if (tenorValue == 12) monthly = 5676000;
            else if (tenorValue == 24) monthly = 3151000;
            else if (tenorValue == 36) monthly = 2353000;
        }
        else if (dpValue == 12500000) {
            if (tenorValue == 12) monthly = 5623000;
            else if (tenorValue == 24) monthly = 3121000;
            else if (tenorValue == 36) monthly = 2331000;
        }
        else if (dpValue == 13000000) {
            if (tenorValue == 12) monthly = 5569000;
            else if (tenorValue == 24) monthly = 3092000;
            else if (tenorValue == 36) monthly = 2309000;
        }
        else if (dpValue == 13500000) {
            if (tenorValue == 12) monthly = 5515000;
            else if (tenorValue == 24) monthly = 3062000;
            else if (tenorValue == 36) monthly = 2286000;
        }
        else if (dpValue == 14000000) {
            if (tenorValue == 12) monthly = 5461000;
            else if (tenorValue == 24) monthly = 3032000;
            else if (tenorValue == 36) monthly = 2264000;
        }
        else if (dpValue == 14500000) {
            if (tenorValue == 12) monthly = 5407000;
            else if (tenorValue == 24) monthly = 3003000;
            else if (tenorValue == 36) monthly = 2241000;
        }
        else if (dpValue == 15000000) {
            if (tenorValue == 12) monthly = 5354000;
            else if (tenorValue == 24) monthly = 2973000;
            else if (tenorValue == 36) monthly = 2219000;
        }
        else if (dpValue == 15500000) {
            if (tenorValue == 12) monthly = 5300000;
            else if (tenorValue == 24) monthly = 2943000;
            else if (tenorValue == 36) monthly = 2196000;
        }
        else if (dpValue == 16000000) {
            if (tenorValue == 12) monthly = 5246000;
            else if (tenorValue == 24) monthly = 2914000;
            else if (tenorValue == 36) monthly = 2174000;
        }
        else if (dpValue == 16500000) {
            if (tenorValue == 12) monthly = 5192000;
            else if (tenorValue == 24) monthly = 2884000;
            else if (tenorValue == 36) monthly = 2152000;
        }
        else if (dpValue == 17000000) {
            if (tenorValue == 12) monthly = 5138000;
            else if (tenorValue == 24) monthly = 2849000;
            else if (tenorValue == 36) monthly = 2129000;
        }

        // TAMPIL HASIL
if (monthly > 0) {
  monthlyPayment.innerHTML = formatRupiah(monthly);

  // ========================================================
  // LOGIKA PESAN WA DINAMIS (BISA UNTUK SEMUA JENIS MOTOR)
  // ========================================================
  const motorName = document.querySelector('.panel__title').innerText.trim();
  const installmentText = formatRupiah(monthly);
  
  // Mengambil teks dari option DP yang dipilih (ex: "Rp 3.000.000")
  const dpText = dpSelect.options[dpSelect.selectedIndex].text; 

  // Format kalimat pesan WhatsApp (Menggunakan '\n' untuk baris baru)
  const textMessage = `Halo Sales Suzuki, saya tertarik dengan unit *${motorName}*.\n\n` +
                      `Saya sudah mencoba simulasi di website dengan detail:\n` +
                      `- Down Payment (DP): ${dpText}\n` +
                      `- Tenor: ${tenorValue} Bulan\n` +
                      `- Angsuran: *${installmentText}/bulan*\n\n` +
                      `Boleh minta info lebih lanjut terkait ketersediaan unit dan diskonnya? Terima kasih.`;

  // Menggunakan kode negara 62 agar parameter pesan teks ter-encode dengan sempurna
  const waUrl = `https://wa.me/6282299318387?text=${encodeURIComponent(textMessage)}`;

  const waBtn = document.getElementById('waSalesBtn');
  if (waBtn) {
    waBtn.href = waUrl;
  }
  
  resultNote.innerHTML = "Cicilan selama " + tenorValue + " bulan";
  resultCard.classList.remove("hidden");
} else {
  resultCard.classList.add("hidden");
}
      }

      tenorButtons.forEach(button => {
        button.addEventListener("click", () => {
          tenorButtons.forEach(btn => btn.classList.remove("active"));
          button.classList.add("active");
          tenorInput.value = button.dataset.tenor;
          updateInstallment();
        });
      });

      dpSelect.addEventListener("change", updateInstallment);

      function closePage() {
        if (confirm("Apakah Anda yakin ingin kembali ke spesifikasi motor?")) {
          window.location.href = "../SPESIFIKASI/index_vstrom250sx.html";
        }
      }

      function goToDetailMotor() {
        document.querySelector('.tab:nth-child(1)').classList.add('tab--active');
        document.querySelector('.tab:nth-child(2)').classList.remove('tab--active');
        setTimeout(() => {
          window.location.href = "../SPESIFIKASI/index_vstrom250sx.html";
        }, 100);
      }

      function stayInKalkulator() {
        document.querySelector('.tab:nth-child(1)').classList.remove('tab--active');
        document.querySelector('.tab:nth-child(2)').classList.add('tab--active');
      }

      // 1. AMBIL PARAMETER URL (ID MOTOR & ASAL HALAMAN)
// ========================================================
const urlParams = new URLSearchParams(window.location.search);
const motorId = urlParams.get('id');
const asalHalaman = urlParams.get('from');

// Helper untuk format angka ke Rupiah saat dimasukkan ke input
function formatRupiahKalkulator(value) {
  return "Rp " + value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

// ========================================================
// 2. FETCH HARGA DARI DATABASE (HANYA MENGGANTI HARGA MOTOR)
// ========================================================
if (motorId) {
  fetch(`/api/motors`)
    .then(res => res.json())
    .then(data => {
      // Mencari data motor berdasarkan ID yang dikirim
      const motor = data.motors.find(m => m.id == motorId);
      if (motor) {
        const inputHarga = document.getElementById('hargaMotor');
        
        // Ganti nilai input harga dengan harga realtime database
        inputHarga.value = formatRupiahKalkulator(motor.harga);

        // Memicu ulang event listener atau jalankan fungsi hitung otomatis Anda (jika ada)
        // misal: inputHarga.dispatchEvent(new Event('input'));
        if (typeof updateInstallment === 'function') {
          updateInstallment();
        }
      }
    })
    .catch(err => {
      console.error("Gagal memuat harga terupdate dari database:", err);
    });
}

// ========================================================
// 3. PERBAIKAN TOMBOL CLOSE (& NAVIGASI TAB DETAIL)
// ========================================================
function closePage() {
  if (confirm("Apakah Anda yakin ingin kembali ke Detail Motor?")) {
    // Kembali ke detail motor dengan membawa id dan parameter asal halaman sebelumnya
    window.location.href = `../KATALOG/detail_motor.html?id=${motorId}&from=${asalHalaman}`;
  }
}

// Jika tab "Detail Motor" diklik, arahkan ke fungsi yang sama
function goToDetailMotor() {
  window.location.href = `../KATALOG/detail_motor.html?id=${motorId}&from=${asalHalaman}`;

      };
    </script>
  </body>
</html>
