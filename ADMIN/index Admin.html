<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Suzuki - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8eef5 0%, #d4dce8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 60px 45px;
            position: relative; /* Diperlukan untuk posisi tombol X */
        }

        /* Styling tombol X */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            color: #b0b0b0;
            text-decoration: none;
            font-weight: bold;
            line-height: 1;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #000000;
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #666666;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #0052cc;
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b0b0b0;
            pointer-events: none;
            width: 20px;
            height: 20px;
        }

        .form-input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #0052cc;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 400;
            color: #333333;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #0052cc;
            box-shadow: 0 0 0 4px rgba(0, 82, 204, 0.08);
        }

        .password-toggle-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: #b0b0b0;
            display: flex;
            align-items: center;
        }

        .login-button {
            width: 100%;
            padding: 14px 16px;
            background: #002b7f;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 28px;
            box-shadow: 0 4px 14px rgba(0, 43, 127, 0.25);
        }

        .login-button:hover {
            background: #001f5a;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <a href="../BERANDA/index_beranda.html" class="close-btn">×</a>

            <div class="header">
                <h1>Website Suzuki</h1>
                <p>Tim Digital Marketing</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><img src="./Icon-1.svg" alt="Username"></span>
                        <input type="text" class="form-input" id="username" placeholder="Masukan username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><img src="./Icon-2.svg" alt="Password"></span>
                        <input type="password" class="form-input" id="password" placeholder="Masukan password" required>
                        <button type="button" class="password-toggle-btn" id="eyeToggle">
                            <img src="./Icon-3.svg" alt="Toggle Password">
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-button">Login</button>
            </form>
        </div>
    </div>

    <script>
    // Fungsi Toggle Password
    const passwordInput = document.getElementById('password');
    const eyeToggle = document.getElementById('eyeToggle');

    eyeToggle.addEventListener('click', function() {
        passwordInput.type = (passwordInput.type === 'password') ? 'text' : 'password';
    });

    // Fungsi Login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        // Kirim ke Backend API untuk verifikasi database
        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert('Login Berhasil!');
                window.location.href = '../BERANDA ADMIN/index BA.html';
            } else {
                alert('Login Gagal: ' + data.message);
            }
        })
        .catch(err => alert('Error: ' + err.message));
    });
</script>
</body>
</html>
