<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Harga Motor - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: #f5f5f5;
            color: #333333;
        }

       /* 1. Modifikasi Header: Kurangi padding vertikal jika logo ingin dibuat sangat besar */
.header {
    background: linear-gradient(90deg, #003d99 0%, #0052cc 100%);
    padding: 10px 30px; /* Diubah dari 16px menjadi 10px agar mengimbangi besarnya logo */
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Cari bagian ini dan ganti kodenya */
.header-logo {
    height: 80px; /* Naikkan secara agresif dari 55px/65px ke 80px */
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
}

/* 3. Maksimalkan Gambar Logonya */
.header-logo img {
    height: 100%;       /* Mengikuti tinggi container (80px) */
    width: auto;        /* Mencegah gambar menjadi gepeng */
    object-fit: contain;
    transform: scale(1.2); /* OPSI TAMBAHAN: Memaksa gambar melar 20% lebih besar dari resolusi aslinya */
}

        .header-text {
            color: white;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.2;
        }

        .header-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-greeting {
            text-align: right;
            color: white;
            font-size: 13px;
        }

        .greeting-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .greeting-user {
            font-weight: 600;
            font-size: 13px;
        }

        .logout-btn {
            background: white;
            color: #003d99;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .logout-btn img {
            width: 14px;
            height: 14px;
        }

        /* Main Container */
        .container {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #003d99 0%, #0052cc 100%);
            border-radius: 12px;
            padding: 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.15);
        }

        .stat-content h3 {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon img {
            width: 32px;
            height: 32px;
        }

        /* Search Section */
        .search-section {
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #0052cc;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: #999999;
        }

        .search-box:focus {
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
        }

        /* Table Section */
        .table-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .table-header {
            background: linear-gradient(90deg, #003d99 0%, #0052cc 100%);
            padding: 20px 25px;
            color: white;
            font-size: 15px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Memaksa kolom mengikuti ukuran width persentase */
        }

        table thead {
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }

        table thead th {
            padding: 16px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s ease;
        }

        table tbody tr:hover {
            background-color: #f9f9f9;
        }

        table tbody td {
            padding: 16px 20px;
            font-size: 14px;
            color: #333333;
            vertical-align: middle;
        }

        .motor-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .motor-image {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .motor-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .motor-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 4px;
        }

        .motor-info p {
            font-size: 12px;
            color: #999999;
        }

        .tipe-badge {
            display: inline-block;
            padding: 6px 12px;
            background: #e8f0ff;
            color: #0052cc;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .tipe-badge.matic { background: #e8f0ff; color: #0052cc; }
        .tipe-badge.sport { background: #ffe8e8; color: #ff0000; }

        .price-original {
            color: #333333;
            font-weight: 600;
        }

        .edit-btn {
            background: linear-gradient(90deg, #003d99 0%, #0052cc 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .edit-btn:hover {
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.3);
            transform: translateY(-2px);
        }

        .edit-btn img {
            width: 14px;
            height: 14px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container { padding: 20px; }
            .stats-section { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
            .stat-card { padding: 20px; }
            .stat-value { font-size: 24px; }
        }

        @media (max-width: 768px) {
            table { table-layout: auto; }
            .header { flex-wrap: wrap; gap: 15px; padding: 15px 20px; }
            .header-left { width: 100%; }
            .header-right { width: 100%; justify-content: space-between; }
            .stats-section { grid-template-columns: 1fr; }
            .stat-card { justify-content: space-between; }
            table { font-size: 12px; }
            table th, table td { padding: 12px 10px; }
            .motor-image { width: 40px; height: 40px; }
            .edit-btn { padding: 6px 10px; font-size: 11px; }
        }

        /* === EDIT MODE CSS === */
        .price-input { width: 100%; padding: 8px 10px; border: 2px solid #0052cc; border-radius: 6px; font-size: 14px; font-weight: 600; }
        .action-buttons { display: flex; gap: 8px; }
        .save-btn { background: #28a745; color: white; }
        .cancel-btn { background: #dc3545; color: white; }
        .save-btn, .cancel-btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="header-logo">
                <img src="./ICON WEB SUZUKI (22).png" alt="Suzuki Logo">
            </div>
            <div class="header-text">
                <div class="header-title">Manajemen Harga Motor</div>
                <div class="header-subtitle">SUZUKI MOTOR SURABAYA</div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-greeting">
                <div class="greeting-label">Selamat datang,</div>
                <div class="greeting-user">admin</div>
            </div>
            <button class="logout-btn">
                <img src="./Icon-1.svg" alt="Logout">
                Logout
            </button>
        </div>
    </header>

    <div class="container">
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-content">
                    <h3>Total Motor</h3>
                    <div class="stat-value" id="total-motor">-</div>
                </div>
                <div class="stat-icon">
                    <img src="./Icon-2.svg" alt="Total Motor">
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-content">
                    <h3>Rata-rata Harga</h3>
                    <div class="stat-value" id="rata-harga">-</div>
                </div>
                <div class="stat-icon">
                    <img src="./Icon-3.svg" alt="Rata-rata Harga">
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-content">
                    <h3>Terakhir Update</h3>
                    <div class="stat-value" id="terakhir-update">-</div>
                </div>
                <div class="stat-icon">
                    <img src="./Icon-4.svg" alt="Terakhir Update">
                </div>
            </div>
        </section>

        <section class="search-section">
            <input 
                type="text" 
                id="search-motor"
                class="search-box" 
                placeholder="Cari motor berdasarkan merek, model, atau tipe..."
            >
        </section>

        <section class="table-section">
            <div class="table-header" id="judul-tabel">
                Daftar Motor
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 50%;">MOTOR</th>
                        <th style="width: 15%;">TIPE</th>
                        <th style="width: 20%;">HARGA</th>
                        <th style="width: 15%;">AKSI</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </div>

    <script>
    const API_URL = '/api/motors';
    const tbody = document.querySelector('table tbody');

    // 1. FUNGSI UNTUK MENGAMBIL DATA DARI BACKEND
    async function fetchMotors() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            renderTable(data.motors);
            updateStats(data.summary, data.motors.length);
        } catch (error) {
            console.error('Error fetching data:', error);
        }
    }

    // 2. FUNGSI UNTUK MERENDER TABEL
    function renderTable(motors) {
        tbody.innerHTML = '';
        
        if (!motors || motors.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Tidak ada data motor ditemukan</td></tr>`;
            return;
        }

        motors.forEach(motor => {
            const tr = document.createElement('tr');
            tr.setAttribute('data-id', motor.id);
            
            const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);

            tr.innerHTML = `
                <td>
                    <div class="motor-cell">
                        <div class="motor-image">
                            <img src="./${motor.gambar_motor || 'motor-1.jpg'}" alt="${motor.nama_motor}">
                        </div>
                        <div class="motor-info">
                            <h4>${motor.nama_motor}</h4>
                            <p>ID: ${motor.id}</p>
                        </div>
                    </div>
                </td>
                <td><span class="tipe-badge ${motor.tipe ? motor.tipe.toLowerCase() : ''}">${motor.tipe}</span></td>
                <td class="price-original">${formatRp(motor.harga)}</td>
                <td>
                    <button class="edit-btn" onclick="switchToEditMode(this, ${motor.id}, ${motor.harga})">
                        <img src="./Icon-4.svg" alt="Edit"> Edit Harga
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 3. SWITCH KE MODE EDIT INLINE (DIPERBAIKI JADI PAS 4 KOLOM)
    function switchToEditMode(button, id, currentHarga) {
        const tr = button.closest('tr');
        
        const motorName = tr.querySelector('.motor-info h4').textContent;
        const tipeText = tr.querySelector('.tipe-badge').textContent;
        const tipeClass = tr.querySelector('.tipe-badge').className; 
        const imgSrc = tr.querySelector('.motor-image img').getAttribute('src');

        tr.classList.add('edit-mode');
        tr.innerHTML = `
            <td>
                <div class="motor-cell">
                    <div class="motor-image"><img src="${imgSrc}" alt="${motorName}"></div>
                    <div class="motor-info">
                        <h4>${motorName}</h4>
                        <p>ID: ${id}</p>
                    </div>
                </div>
            </td>
            <td><span class="${tipeClass}">${tipeText}</span></td>
            <td>
                <div style="font-size: 11px; color: #888; margin-bottom: 4px;">Harga OTR</div>
                <input type="number" class="price-input harga-otr" value="${currentHarga}">
            </td>
            <td>
                <div class="action-buttons">
                    <button class="save-btn" onclick="saveData(${id}, this)">Simpan</button>
                    <button class="cancel-btn" onclick="fetchMotors()">Batal</button>
                </div>
            </td>
        `;
    }

    // 4. SIMPAN DATA KE DATABASE (PUT)
    async function saveData(id, button) {
        const tr = button.closest('tr');
        const harga = tr.querySelector('.harga-otr').value;

        if (!harga) {
            alert('Harga tidak boleh kosong!');
            return;
        }

        try {
            button.disabled = true;
            button.innerText = 'Menyimpan...';

            const response = await fetch(`/api/motors/${id}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    harga: parseInt(harga)
                })
            });

            const result = await response.json();

            if (response.ok && result.success) {
                alert('Harga sukses diperbarui');
                fetchMotors(); 
            } else {
                alert('Gagal memperbarui data: ' + (result.message || result.error));
                fetchMotors();
            }
        } catch (error) {
            console.error('Error updating data:', error);
            alert('Terjadi kesalahan koneksi ke server backend.');
            fetchMotors();
        }
    }

    // 5. UPDATE CARD ATAS
    function updateStats(summary, totalCount) {
        if (!summary) return;

        const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num || 0);

        document.querySelector('.stats-section .stat-card:nth-child(1) .stat-value').textContent = totalCount || summary.total_motor || 0;
        document.querySelector('.table-header').textContent = `Daftar Motor (${totalCount || summary.total_motor || 0})`;

        document.querySelector('.stats-section .stat-card:nth-child(2) .stat-value').textContent = formatRp(summary.rata_harga);

        if (summary.terakhir_update) {
            const date = new Date(summary.terakhir_update);
            const opsi = { day: 'numeric', month: 'short', year: 'numeric' };
            document.querySelector('.stats-section .stat-card:nth-child(3) .stat-value').textContent = date.toLocaleDateString('id-ID', opsi);
        } else {
            document.querySelector('.stats-section .stat-card:nth-child(3) .stat-value').textContent = '-';
        }
    }

    // 6. LIVE SEARCH
    document.querySelector('.search-box').addEventListener('keyup', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        const tableRows = document.querySelectorAll('table tbody tr');
        
        tableRows.forEach(row => {
            const motorName = row.querySelector('.motor-info h4')?.textContent.toLowerCase() || '';
            const tipeText = row.querySelector('.tipe-badge')?.textContent.toLowerCase() || '';
            
            if (motorName.includes(searchTerm) || tipeText.includes(searchTerm)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });

    // Logout
    document.querySelector('.logout-btn').addEventListener('click', function() {
        if (confirm('Apakah Anda yakin ingin logout?')) {
            window.location.href = '../ADMIN/index Admin.html';
        }
    });

    fetchMotors();
</script>
</body>
</html>
